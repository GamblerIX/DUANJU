name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'New release'
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtmultimedia'
        
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      
    - name: Build
      run: cmake --build build --config Release
      
    - name: Run Tests
      run: ctest --test-dir build --build-config Release --output-on-failure
      
    - name: Create Release Directory
      run: |
        mkdir release
        copy build\Release\DuanjuGUI.exe release\
        
    - name: Deploy Qt Dependencies
      run: |
        windeployqt release\DuanjuGUI.exe --release --no-translations
        
    - name: Create ZIP Archive
      run: |
        Compress-Archive -Path release\* -DestinationPath DuanjuGUI-${{ github.event.inputs.version || github.ref_name }}-windows-x64.zip
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
        name: DuanjuGUI ${{ github.event.inputs.version || github.ref_name }}
        body: ${{ github.event.inputs.release_notes || 'New release' }}
        draft: false
        prerelease: false
        files: |
          DuanjuGUI-*-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
