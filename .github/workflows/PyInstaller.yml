name: PyInstaller Build (Quick Test)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        type: string
      build_type:
        description: '构建类型'
        required: true
        type: choice
        options:
          - Release
          - Debug
        default: Release
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      build_type:
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ inputs.build_type }}/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        env:
          PYTHONPATH: ${{ github.workspace }}/${{ inputs.build_type }}
        run: |
          cd ${{ inputs.build_type }}
          pyinstaller --noconfirm --onefile --windowed `
            --icon=../.github/workflows/favicon.ico `
            --add-data "assets;assets" `
            --paths=. `
            --hidden-import=src `
            --hidden-import=src.core `
            --hidden-import=src.core.models `
            --hidden-import=src.core.theme_manager `
            --hidden-import=src.core.utils `
            --hidden-import=src.core.utils.async_worker `
            --hidden-import=src.core.utils.error_handler `
            --hidden-import=src.core.utils.json_serializer `
            --hidden-import=src.core.utils.network_monitor `
            --hidden-import=src.core.utils.string_utils `
            --hidden-import=src.core.utils.time_utils `
            --hidden-import=src.data `
            --hidden-import=src.data.api `
            --hidden-import=src.data.api.api_client `
            --hidden-import=src.data.api.response_parser `
            --hidden-import=src.data.cache `
            --hidden-import=src.data.cache.cache_manager `
            --hidden-import=src.data.config `
            --hidden-import=src.data.config.config_manager `
            --hidden-import=src.data.favorites `
            --hidden-import=src.data.favorites.favorites_manager `
            --hidden-import=src.data.history `
            --hidden-import=src.data.history.history_manager `
            --hidden-import=src.data.image `
            --hidden-import=src.data.image.image_loader `
            --hidden-import=src.services `
            --hidden-import=src.services.category_service `
            --hidden-import=src.services.download_service `
            --hidden-import=src.services.search_service `
            --hidden-import=src.services.video_service `
            --hidden-import=src.ui `
            --hidden-import=src.ui.controls `
            --hidden-import=src.ui.controls.drama_card `
            --hidden-import=src.ui.controls.loading_spinner `
            --hidden-import=src.ui.controls.pagination `
            --hidden-import=src.ui.controls.video_player `
            --hidden-import=src.ui.dialogs `
            --hidden-import=src.ui.dialogs.episode_dialog `
            --hidden-import=src.ui.dialogs.settings_dialog `
            --hidden-import=src.ui.dialogs.splash_dialog `
            --hidden-import=src.ui.interfaces `
            --hidden-import=src.ui.interfaces.category_interface `
            --hidden-import=src.ui.interfaces.download_interface `
            --hidden-import=src.ui.interfaces.favorites_interface `
            --hidden-import=src.ui.interfaces.history_interface `
            --hidden-import=src.ui.interfaces.home_interface `
            --hidden-import=src.ui.interfaces.search_interface `
            --hidden-import=src.ui.windows `
            --hidden-import=src.ui.windows.main_window `
            --hidden-import=src.ui.windows.player_window `
            --name DUANJU-${{ inputs.build_type }}-${{ inputs.version }} `
            --distpath ../dist `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DUANJU-PyInstaller-${{ inputs.build_type }}-${{ inputs.version }}
          path: dist/DUANJU-${{ inputs.build_type }}-${{ inputs.version }}.exe
          retention-days: 14
