name: Nuitka Build (Production)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Release/requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build with Nuitka
        run: |
          cd Release
          python -m nuitka --standalone --onefile `
            --windows-console-mode=disable `
            --windows-icon-from-ico=../.github/workflows/favicon.ico `
            --enable-plugin=pyqt6 `
            --include-data-dir=assets=assets `
            --include-module=src `
            --include-module=src.core `
            --include-module=src.core.models `
            --include-module=src.core.theme_manager `
            --include-module=src.core.utils `
            --include-module=src.core.utils.async_worker `
            --include-module=src.core.utils.error_handler `
            --include-module=src.core.utils.json_serializer `
            --include-module=src.core.utils.network_monitor `
            --include-module=src.core.utils.string_utils `
            --include-module=src.core.utils.time_utils `
            --include-module=src.data `
            --include-module=src.data.api `
            --include-module=src.data.api.api_client `
            --include-module=src.data.api.response_parser `
            --include-module=src.data.cache `
            --include-module=src.data.cache.cache_manager `
            --include-module=src.data.config `
            --include-module=src.data.config.config_manager `
            --include-module=src.data.favorites `
            --include-module=src.data.favorites.favorites_manager `
            --include-module=src.data.history `
            --include-module=src.data.history.history_manager `
            --include-module=src.data.image `
            --include-module=src.data.image.image_loader `
            --include-module=src.services `
            --include-module=src.services.category_service `
            --include-module=src.services.download_service `
            --include-module=src.services.search_service `
            --include-module=src.services.video_service `
            --include-module=src.ui `
            --include-module=src.ui.controls `
            --include-module=src.ui.controls.drama_card `
            --include-module=src.ui.controls.loading_spinner `
            --include-module=src.ui.controls.pagination `
            --include-module=src.ui.controls.video_player `
            --include-module=src.ui.dialogs `
            --include-module=src.ui.dialogs.episode_dialog `
            --include-module=src.ui.dialogs.settings_dialog `
            --include-module=src.ui.dialogs.splash_dialog `
            --include-module=src.ui.interfaces `
            --include-module=src.ui.interfaces.category_interface `
            --include-module=src.ui.interfaces.download_interface `
            --include-module=src.ui.interfaces.favorites_interface `
            --include-module=src.ui.interfaces.history_interface `
            --include-module=src.ui.interfaces.home_interface `
            --include-module=src.ui.interfaces.search_interface `
            --include-module=src.ui.windows `
            --include-module=src.ui.windows.main_window `
            --include-module=src.ui.windows.player_window `
            --output-filename=DUANJU-${{ inputs.version }}.exe `
            --output-dir=../dist `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DUANJU-Nuitka-${{ inputs.version }}
          path: dist/DUANJU-${{ inputs.version }}.exe
          retention-days: 30
