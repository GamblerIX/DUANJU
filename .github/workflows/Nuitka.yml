name: Nuitka Build (Production)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Release/requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build with Nuitka
        run: |
          cd Release
          python -m nuitka --standalone --onefile `
            --windows-console-mode=disable `
            --windows-icon-from-ico=../.github/workflows/favicon.ico `
            --enable-plugin=pyqt6 `
            --include-data-dir=assets=assets `
            --include-package=src `
            --include-package=src.core `
            --include-package=src.core.utils `
            --include-package=src.data `
            --include-package=src.data.api `
            --include-package=src.data.cache `
            --include-package=src.data.config `
            --include-package=src.data.favorites `
            --include-package=src.data.history `
            --include-package=src.data.image `
            --include-package=src.services `
            --include-package=src.ui `
            --include-package=src.ui.controls `
            --include-package=src.ui.dialogs `
            --include-package=src.ui.interfaces `
            --include-package=src.ui.windows `
            --output-filename=DUANJU-${{ inputs.version }}.exe `
            --output-dir=../dist `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DUANJU-Nuitka-${{ inputs.version }}
          path: dist/DUANJU-${{ inputs.version }}.exe
          retention-days: 30
